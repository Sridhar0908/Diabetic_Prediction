{% extends "base.html" %}
{% block title %}Login - MediCare{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-lg p-4">
      <h3 class="mb-3">Sign in</h3>
      <p class="text-muted small">Use your account to access prediction tools and patient dashboard.</p>

      <form action="{{ url_for('login') }}" method="post" class="mt-3">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input name="email" type="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input name="password" type="password" class="form-control" placeholder="Password" required>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember" name="remember">
            <label class="form-check-label small" for="remember">Remember me</label>
          </div>
          <a href="#" class="small">Forgot password?</a>
        </div>

        <button class="btn btn-primary w-100">Sign in</button>
      </form>

      <div class="text-center mt-3 small">
        New here? <a href="{{ url_for('signup') }}">Create an account</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
